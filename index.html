<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Oxygen:wght@400;700&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
  
  <title>SNEAKERS</title>

</head>
<body>
  <header class="header flex-column-aligns-center-justfy-center">
    <div class="limiter subhead flex-column-aligns-center-justfy-center">
      <div class="head-ml flex-column-aligns-center-justfy-center">
        <button class="hamburger-menu">
          <img src="./images/icon-menu.svg" alt="">
        </button>
          <h1>
            <a href="#"><img src="./images/logo.svg" alt=""></a>
          </h1>
      </div>

      <nav class="nav">
        <ul class="lista-nav flex-column-aligns-center-justfy-center">
          <li><a href="#">Collections</a></li>
          <li><a href="#">Men</a></li>
          <li><a href="#">Women</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <div class="user-cart flex-column-aligns-center-justfy-center">
        <button class="btn-cart">
          <img src="./images/icon-cart.svg" alt="">
        </button>

        <div class="user">
          <img src="./images/image-avatar.png" alt="">
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="box-sneaker">
      <div class="box-back-sneacker flex-column-aligns-center-justfy-center">
        <button class="next"><img src="./images/icon-previous.svg" alt=""></button>
        <button class="next"><img src="./images/icon-next.svg" alt=""></button>
      </div>
      <div class="box-carrosel">
        <div class="sneak1">
          <img src="./images/image-product-1-thumbnail.jpg" alt="">
        </div>
        <div class="sneak1">
          <img src="./images/image-product-2-thumbnail.jpg" alt="">
        </div>
        <div class="sneak1">
          <img src="./images/image-product-3-thumbnail.jpg" alt="">
        </div>
        <div class="sneak1">
          <img src="./images/image-product-4-thumbnail.jpg" alt="">
        </div>
      </div>
    </div>

    <div class="box-info flex-column-aligns-center-justfy-center">
      <div class="limiter box-text flex-column-aligns-center-justfy-center">
        <p class="company">Sneaker Company</p>
        <h2 class="fall">
          Fall Limited Edition Sneakers
        </h2>
        <p class="offer">
          These low-profile sneakers are your perfect casual wear companion. Featuring a 
          durable rubber outer sole, they’ll withstand everything the weather can offer.
        </p>
      </div>
      <div class="box-value limiter flex-column-aligns-center-justfy-center">
        <div class="percent flex-column-aligns-center-justfy-center">
          <h3>$125.00</h3>
          <p class="descont">50%</p>
        </div>
        <p>$250.00</p>
      </div>
      <div class="add-minus limiter flex-column-aligns-center-justfy-center">
        <button class="plus"><img src="./images/icon-minus.svg" alt=""></button>
        <span>0</span>
        <button class="plus"><img src="./images/icon-plus.svg" alt=""></button>
      </div>
      <div class="limiter add-cart flex-column-aligns-center-justfy-center">
        <button class="cart"><img src="./images/icon-cart.svg" alt=""></button>
        <p>Add to cart</p>
      </div>

    </div>
  </main>

</body>
</html>
